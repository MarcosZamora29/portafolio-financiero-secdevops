version: "3.8"

services:
  # ─────────────────────────────
  # BASE DE DATOS MySQL (Docker)
  # ─────────────────────────────
  db:
    image: mysql:8.0
    container_name: portafolio_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: portafolio_financiero
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass
    ports:
      - "3307:3306"         # MySQL accesible desde tu PC en localhost:3307
    volumes:
      - db_data:/var/lib/mysql
      - ./portfolio_db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uappuser", "-papppass"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────
  # BACKEND Flask (usa MySQL del contenedor)
  # ─────────────────────────────
  backend:
    build: .
    container_name: portafolio_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db                 # nombre del servicio MySQL
      DB_PORT: 3306
      DB_USER: appuser
      DB_PASSWORD: apppass
      DB_NAME: portafolio_financiero
      FLASK_SECRET_KEY: dev_secret_change_me
      FLASK_DEBUG: "false"
    ports:
      - "5000:5000"
    volumes:
      - .:/app

volumes:
  db_data:
