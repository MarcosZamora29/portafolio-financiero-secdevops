name: CI - Portafolio Financiero

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Descarga el código del repositorio
      - name: Checkout código
        uses: actions/checkout@v4

      # 2. Configura Python
      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3. Instala dependencias
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Ejecuta los tests
      - name: Ejecutar tests
        env:
          DB_HOST: localhost
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: ""
          DB_NAME: portafolio_test
          FLASK_SECRET_KEY: ci_test_secret
          FLASK_DEBUG: "false"
        run: python -m pytest -q

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      # 1. Descarga el código
      - name: Checkout código
        uses: actions/checkout@v4

      # 2. Construye la imagen Docker
      - name: Build imagen Docker
        run: |
          docker build -t portafolio-backend .

      # 3. Verifica que la imagen se creó
      - name: Verificar imagen
        run: |
          docker images portafolio-backend
